[window]
option_as_alt = "Both"

[terminal.shell]
program = "/bin/bash"
args = ["-i"]

[keyboard]
bindings = [
  # Alt+Left/Right = backward/forward word
  { key = "Left", mods = "Alt", chars = "\u001bb" },
  { key = "Right", mods = "Alt", chars = "\u001bf" },

  # Cmd+Left/Right = beginning/end of line
  { key = "Left", mods = "Command", chars = "\u0001" },
  { key = "Right", mods = "Command", chars = "\u0005" },

  # Alt+Backspace = delete previous word
  { key = "Back", mods = "Alt", chars = "\u0017" },

  # Cmd+Backspace = kill line
  { key = "Back", mods = "Command", chars = "\u0015" },

  # Pane splitting
  { key = "D", mods = "Command", chars = "\u0002%" },
  { key = "D", mods = "Command|Shift", chars = "\u0002\"" },

  # Close pane
  { key = "W", mods = "Command", chars = "\u0002x" },

  # Pane navigation
  { key = "Left", mods = "Command", chars = "\u001b[1;5D" },
  { key = "Right", mods = "Command", chars = "\u001b[1;5C" },
  { key = "Up", mods = "Command", chars = "\u001b[1;5A" },
  { key = "Down", mods = "Command", chars = "\u001b[1;5B" },

  # Cmd+[ = previous pane
  { key = "LBracket", mods = "Command", chars = "\u0002[" },
  # Cmd+] = next pane
  { key = "RBracket", mods = "Command", chars = "\u0002]" },

  # New window
  { key = "T", mods = "Command", chars = "\u0002c" },
  # Jump to windows 0-9
  { key = "Key0", mods = "Command", chars = "\u00020" },
  { key = "Key1", mods = "Command", chars = "\u00021" },
  { key = "Key2", mods = "Command", chars = "\u00022" },
  { key = "Key3", mods = "Command", chars = "\u00023" },
  { key = "Key4", mods = "Command", chars = "\u00024" },
  { key = "Key5", mods = "Command", chars = "\u00025" },
  { key = "Key6", mods = "Command", chars = "\u00026" },
  { key = "Key7", mods = "Command", chars = "\u00027" },
  { key = "Key8", mods = "Command", chars = "\u00028" },
  { key = "Key9", mods = "Command", chars = "\u00029" },

  # Cmd+Shift+J = toggle zoom
  { key = "J", mods = "Command|Shift", chars = "\u0002z" },

  # Cmd+Shift+= / Cmd+Shift+- = font size
  { key = "+", mods = "Command|Shift", action = "IncreaseFontSize" },
  { key = "_", mods = "Command|Shift", action = "DecreaseFontSize" },

  { key = "Return", mods = "Shift", chars = "\u001b[13;2u" },
]
