set -g xterm-keys on
bind x kill-pane

# Pane navigation without prefix
bind -n C-Left  select-pane -L
bind -n C-Right select-pane -R
bind -n C-Up    select-pane -U
bind -n C-Down  select-pane -D

# Window navigation
bind -n C-S-Left  previous-window
bind -n C-S-Right next-window

# Cycle panes
bind ] select-pane -t :.+
bind [ select-pane -t :.-

# Toggle zoom (maximize / restore pane)
bind -n C-S-j resize-pane -Z
# Reload tmux config
bind -n C-r source-file ~/.tmux.conf \; display-message "tmux reloaded"
